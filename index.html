<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>빗속의 펜션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=SUIT:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">Text Adventure Mystery</p>
      <div>
        <h1>빗속의 펜션</h1>
        <p class="subtitle">폭우로 고립된 산장 같은 펜션. 새벽이 오기 전, 사라진 손님의 흔적을 찾아야 합니다.</p>
      </div>
    </header>

    <main class="game-layout">
      <section class="story-panel">
        <div class="status-bar">
          <div>
            <span class="status-label">현재 장면</span>
            <strong id="scene-title">로딩 중...</strong>
          </div>
          <div class="status-actions">
            <button id="toggle-clues" class="secondary-button" type="button">단서 목록</button>
            <button id="restart-button" class="secondary-button" type="button">처음부터</button>
          </div>
        </div>

        <article class="story-card">
          <div id="scene-tag" class="scene-tag">SCENE</div>
          <div id="story-text" class="story-text"></div>
        </article>

        <section class="choice-panel">
          <h2>선택지</h2>
          <div id="choices" class="choice-list"></div>
        </section>
      </section>

      <aside id="clue-panel" class="clue-panel" aria-live="polite">
        <div class="clue-header">
          <div>
            <p class="eyebrow">Evidence</p>
            <h2>단서 목록</h2>
          </div>
          <span id="clue-count" class="clue-count">0개</span>
        </div>
        <p class="clue-help">조사와 대화로 얻은 정보가 여기에 정리됩니다.</p>
        <ul id="clue-list" class="clue-list"></ul>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
